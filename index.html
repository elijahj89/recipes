<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snug Family Kitchen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>" />
  <style>
    :root {
      --bg: #fdfbf7;
      --card: #ffffff;
      --text: #2b2620;
      --muted: #7a7268;
      --accent: #c0562f;
      --accent-soft: #f4e4dc;
      --border: #eae3d8;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1815;
        --card: #23201c;
        --text: #ece6dd;
        --muted: #9c9488;
        --accent: #e07a52;
        --accent-soft: #3a2a22;
        --border: #33302a;
        --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.2);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg); }  /* keeps the inter-page flash on reload the same color, not white */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    /* Sticky app bar: wordmark + view toggle, with search pinned beneath it */
    .topstick {
      position: sticky; top: 0; z-index: 20;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .appbar {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      max-width: 1040px; margin: 0 auto; padding: 0.7rem 1rem 0.55rem;
    }
    .brand { display: flex; align-items: center; gap: 0.5rem; min-width: 0; }
    .brand .emoji { font-size: 1.35rem; line-height: 1; }
    .brand .name {
      font-size: 1.15rem; font-weight: 800; letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .searchbar { max-width: 1040px; margin: 0 auto; padding: 0 1rem 0.7rem; }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 0 1rem 2rem; }

    .search-wrap { position: relative; }
    .search-wrap .icon {
      position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--text);
    }
    #search:focus { outline: 2px solid var(--accent); outline-offset: 0; }

    /* Google-style search suggestions dropdown */
    .suggest {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      overflow: hidden auto; max-height: 60vh; z-index: 30; display: none;
    }
    .suggest.open { display: block; }
    .suggest-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0.9rem; cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover, .suggest-item.active { background: var(--accent-soft); }
    .suggest-item .s-emoji { font-size: 1.05rem; line-height: 1; }
    .suggest-item .s-main { flex: 1; min-width: 0; }
    .suggest-item .s-title {
      font-weight: 600; font-size: 0.98rem; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .suggest-item .s-title mark {
      background: transparent; color: var(--accent); font-weight: 700; padding: 0;
    }
    .suggest-item .s-meta {
      color: var(--muted); font-size: 0.8rem; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .suggest-item .s-cat {
      flex-shrink: 0; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--accent); background: var(--accent-soft);
      padding: 0.15rem 0.5rem; border-radius: 6px; font-weight: 600;
    }
    .suggest-empty { padding: 0.9rem; color: var(--muted); font-size: 0.9rem; text-align: center; }

    .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .view-toggle button {
      background: var(--card); border: none; padding: 0.6rem 0.75rem;
      cursor: pointer; color: var(--muted); display: flex; align-items: center;
    }
    .view-toggle button.active { background: var(--accent); color: #fff; }
    .view-toggle button + button { border-left: 1px solid var(--border); }

    /* Toolbar: filter button + result count */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      margin: 0.95rem 0 0.9rem;
    }
    .filter-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: 0.5rem 0.95rem; border-radius: 10px; cursor: pointer;
      font-size: 0.92rem; font-weight: 600; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.has { border-color: var(--accent); color: var(--accent); }
    .filter-btn .badge {
      display: none; min-width: 1.25rem; height: 1.25rem; padding: 0 0.35rem;
      align-items: center; justify-content: center;
      background: var(--accent); color: #fff; border-radius: 999px;
      font-size: 0.74rem; font-weight: 700;
    }
    .filter-btn.has .badge { display: inline-flex; }
    #count { color: var(--muted); font-size: 0.9rem; }

    .chip {
      padding: 0.42rem 0.9rem; border-radius: 999px;
      border: 1px solid var(--border); background: var(--card); color: var(--muted);
      cursor: pointer; font-size: 0.9rem; transition: all 0.15s; white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Filter sheet (slides up from the bottom) */
    .sheet-scrim {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s; z-index: 50;
    }
    .sheet-scrim.open { opacity: 1; visibility: visible; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 51;
      background: var(--bg); border-radius: 20px 20px 0 0;
      max-height: 82vh; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      box-shadow: 0 -10px 44px rgba(0,0,0,0.24);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-grab { width: 40px; height: 4px; border-radius: 999px; background: var(--border); margin: 0.6rem auto 0.1rem; }
    .sheet-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 1.25rem 0.4rem;
    }
    .sheet-head h3 { font-size: 1.15rem; }
    .sheet-close { background: none; border: none; font-size: 1.6rem; color: var(--muted); cursor: pointer; line-height: 1; }
    .sheet-body { padding: 0.5rem 1.25rem 1rem; overflow-y: auto; }
    .filter-group { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1.2rem; }
    .filter-group:last-child { margin-bottom: 0.5rem; }
    .filter-label {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); font-weight: 700; width: 100%; margin-bottom: 0.2rem;
    }
    .sheet-foot {
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.9rem 1.25rem; border-top: 1px solid var(--border);
      padding-bottom: calc(0.9rem + env(safe-area-inset-bottom, 0px));
    }
    .btn-ghost { background: none; border: none; color: var(--accent); font-weight: 600; font-size: 0.95rem; cursor: pointer; padding: 0.5rem 0.25rem; white-space: nowrap; }
    .btn-primary {
      flex: 1; background: var(--accent); color: #fff; border: none;
      padding: 0.8rem 1rem; border-radius: 12px; font-weight: 700; font-size: 0.98rem; cursor: pointer;
    }

    /* Grid view */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.85rem; }
    .grid .card { padding: 1rem; }
    .grid .card h3 { font-size: 1.12rem; margin: 0.55rem 0 0.35rem; }
    .grid .card .desc { margin-top: 0.5rem; color: var(--muted); font-size: 0.9rem; }

    /* List view */
    .list { display: flex; flex-direction: column; gap: 0.7rem; }
    .list .card { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.2rem; }
    .list .card .body { flex: 1; min-width: 0; }
    .list .card h3 { font-size: 1.1rem; margin: 0.15rem 0; }
    .list .card .desc { display: none; }
    .list .card .taglist { justify-content: flex-end; }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      cursor: pointer; box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
    .cat {
      display: inline-block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--accent); background: var(--accent-soft);
      padding: 0.2rem 0.6rem; border-radius: 6px; font-weight: 600;
    }
    .card .meta { color: var(--muted); font-size: 0.88rem; }
    .taglist { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.6rem; }
    .tag {
      font-size: 0.75rem; color: var(--muted); background: var(--bg);
      border: 1px solid var(--border); padding: 0.12rem 0.5rem; border-radius: 999px;
    }
    .empty { text-align: center; color: var(--muted); padding: 4rem 1rem; }

    /* Full-page recipe view (slides in over the home screen) */
    .recipe-screen {
      position: fixed; inset: 0; z-index: 40;
      background: var(--bg); overflow-y: auto;
      transform: translateX(4%); opacity: 0; visibility: hidden;
      transition: transform 0.34s cubic-bezier(0.32,0.72,0,1), opacity 0.28s ease, visibility 0.34s;
    }
    .recipe-screen.open { transform: translateX(0); opacity: 1; visibility: visible; }
    .topbar {
      position: sticky; top: 0; z-index: 2;
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1.5rem; border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .back {
      display: inline-flex; align-items: center; gap: 0.45rem;
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: 0.5rem 0.95rem; border-radius: 10px; cursor: pointer;
      font-size: 0.95rem; font-weight: 600; transition: all 0.15s;
    }
    .back:hover { border-color: var(--accent); color: var(--accent); }
    .back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .recipe-content { max-width: 720px; margin: 0 auto; padding: 2.25rem 1.5rem 4rem; }
    .recipe-screen.open .recipe-content { animation: contentIn 0.42s cubic-bezier(0.32,0.72,0,1); }
    @keyframes contentIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .recipe-content h2 { font-size: 2.1rem; margin: 0.8rem 0 0.5rem; letter-spacing: -0.02em; }
    .recipe-content .meta-row {
      display: flex; flex-wrap: wrap; gap: 1.2rem; color: var(--muted);
      font-size: 0.92rem; margin-bottom: 1.2rem;
    }
    .recipe-content .description { font-size: 1.05rem; margin-bottom: 1.2rem; }
    .recipe-content h4 {
      font-size: 1.1rem; margin: 1.8rem 0 0.8rem; padding-bottom: 0.4rem;
      border-bottom: 2px solid var(--accent-soft);
    }
    .recipe-content ul, .recipe-content ol { padding-left: 1.4rem; }
    .recipe-content li { margin-bottom: 0.5rem; }
    .recipe-content .notes {
      margin-top: 1.8rem; padding: 1rem 1.2rem; background: var(--accent-soft);
      border-radius: 10px; font-size: 0.95rem;
    }
    /* "Update available" prompt — centered modal over a dimmed overlay */
    .update-scrim {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
      opacity: 0; visibility: hidden; transition: opacity 0.28s ease, visibility 0.28s;
    }
    .update-scrim.show { opacity: 1; visibility: visible; }
    .update-modal {
      background: var(--card); color: var(--text);
      border-radius: 20px; padding: 2rem 1.75rem 1.75rem;
      max-width: 360px; width: 100%; text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      transform: translateY(14px) scale(0.97);
      transition: transform 0.34s cubic-bezier(0.32,0.72,0,1);
    }
    .update-scrim.show .update-modal { transform: none; }
    @keyframes utpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.14); } }
    .um-icon { font-size: 2.6rem; line-height: 1; display: inline-block; animation: utpulse 1.7s ease-in-out infinite; }
    .um-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.01em; margin-top: 0.7rem; }
    .um-sub { color: var(--muted); font-size: 0.98rem; margin: 0.5rem 0 1.5rem; line-height: 1.4; }
    .um-btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      padding: 0.95rem 1rem; border-radius: 13px; font-weight: 800; font-size: 1.05rem;
      cursor: pointer; transition: transform 0.08s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .um-btn:active { transform: scale(0.97); }
    .um-btn:disabled { opacity: 0.9; cursor: default; }

    /* Spinner + full-screen "Updating…" cover shown while the reload navigates */
    .spinner {
      display: inline-block; width: 1em; height: 1em;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -0.15em;
    }
    .spinner.big { width: 2.4rem; height: 2.4rem; border-width: 3px; color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .reload-cover {
      position: fixed; inset: 0; z-index: 70; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s;
    }
    .reload-cover.show { opacity: 1; visibility: visible; }
    .reload-cover .rc-inner {
      display: flex; flex-direction: column; align-items: center; gap: 1.1rem;
      color: var(--muted); font-size: 0.98rem; font-weight: 600;
    }

    @media (prefers-reduced-motion: reduce) {
      .recipe-screen, .recipe-screen.open .recipe-content { transition: opacity 0.2s ease; animation: none; transform: none; }
      .update-scrim { transition: opacity 0.2s ease; }
      .update-modal { transition: none; transform: none; }
      .um-icon { animation: none; }
    }
    @media print {
      .topstick, .toolbar, #results, .topbar { display: none; }
      .recipe-screen {
        position: static; transform: none; opacity: 1; visibility: visible; overflow: visible;
      }
    }
    @media (max-width: 560px) {
      .filter-label { min-width: 100%; margin-bottom: 0.1rem; }
    }
  </style>
</head>
<body>
  <div class="topstick">
    <div class="appbar">
      <div class="brand"><span class="emoji">🍲</span><span class="name">Snug Family Kitchen</span></div>
      <div class="view-toggle" id="viewToggle">
        <button data-view="grid" title="Grid view" aria-label="Grid view">▦</button>
        <button data-view="list" title="List view" aria-label="List view">☰</button>
      </div>
    </div>
    <div class="searchbar">
      <div class="search-wrap">
        <span class="icon">🔍</span>
        <input id="search" type="search" placeholder="Search recipes or ingredients (typos are fine)…" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="suggest" aria-autocomplete="list" />
        <div class="suggest" id="suggest" role="listbox"></div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="toolbar">
      <button class="filter-btn" id="filterBtn" aria-haspopup="dialog">
        <span>⚙ Filters</span><span class="badge" id="filterBadge"></span>
      </button>
      <span id="count"></span>
    </div>
    <div id="results"></div>
    <div class="empty" id="empty" style="display:none">No recipes match. Try clearing a filter or simplifying your search.</div>
  </div>

  <div class="sheet-scrim" id="sheetScrim"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Filters">
    <div class="sheet-grab"></div>
    <div class="sheet-head">
      <h3>Filters</h3>
      <button class="sheet-close" id="sheetClose" aria-label="Close filters">×</button>
    </div>
    <div class="sheet-body">
      <div class="filter-group" id="catGroup"><span class="filter-label">Category</span></div>
      <div class="filter-group" id="tagGroup"><span class="filter-label">Ingredient</span></div>
    </div>
    <div class="sheet-foot">
      <button class="btn-ghost" id="clearBtn">Clear all</button>
      <button class="btn-primary" id="applyBtn">Show results</button>
    </div>
  </div>

  <div class="recipe-screen" id="recipeScreen" aria-hidden="true">
    <div class="topbar">
      <button class="back" id="backBtn">← Back to recipes</button>
    </div>
    <div class="recipe-content" id="recipeContent"></div>
  </div>

  <div class="update-scrim" id="updateScrim">
    <div class="update-modal" role="alertdialog" aria-modal="true" aria-labelledby="umTitle" aria-describedby="umSub">
      <span class="um-icon" aria-hidden="true">🔄</span>
      <div class="um-title" id="umTitle">Update available</div>
      <div class="um-sub" id="umSub">A new version is ready. Reload to get the latest.</div>
      <button class="um-btn" id="reloadBtn">Reload now</button>
    </div>
  </div>

  <div class="reload-cover" id="reloadCover" aria-hidden="true">
    <div class="rc-inner">
      <span class="spinner big"></span>
      <div>Updating to the latest version…</div>
    </div>
  </div>
  <script>try { if (sessionStorage.getItem("sfk-updating")) document.getElementById("reloadCover").classList.add("show"); } catch (e) {}</script>

  <script>
    let recipes = [];
    let activeCat = "All";
    let activeTags = new Set();
    let query = "";
    let view = localStorage.getItem("recipeView") || "grid";

    const results = document.getElementById("results");
    const empty = document.getElementById("empty");
    const catGroup = document.getElementById("catGroup");
    const tagGroup = document.getElementById("tagGroup");
    const recipeScreen = document.getElementById("recipeScreen");
    const recipeContent = document.getElementById("recipeContent");
    const backBtn = document.getElementById("backBtn");
    const searchEl = document.getElementById("search");
    let navigatedInApp = false;
    const suggest = document.getElementById("suggest");
    const countEl = document.getElementById("count");
    let suggestIndex = -1;
    const clearBtn = document.getElementById("clearBtn");
    const viewToggle = document.getElementById("viewToggle");
    const filterBtn = document.getElementById("filterBtn");
    const filterBadge = document.getElementById("filterBadge");
    const applyBtn = document.getElementById("applyBtn");
    const sheet = document.getElementById("sheet");
    const sheetScrim = document.getElementById("sheetScrim");
    const sheetClose = document.getElementById("sheetClose");

    // Auto-detect ingredient tags from a recipe's ingredients + explicit tags.
    const PROTEIN_RULES = [
      ["chicken", /\bchicken\b/],
      ["beef", /\b(beef|steak|ground beef)\b/],
      ["pork", /\b(pork|bacon|ham|sausage|prosciutto)\b/],
      ["seafood", /\b(fish|salmon|tuna|shrimp|prawn|cod|crab|scallop)\b/],
      ["turkey", /\bturkey\b/]
    ];
    function deriveTags(r) {
      const set = new Set((r.tags || []).map(t => t.toLowerCase()));
      const hay = (r.ingredients || []).join(" ").toLowerCase() + " " + (r.title || "").toLowerCase();
      for (const [tag, re] of PROTEIN_RULES) if (re.test(hay)) set.add(tag);
      return [...set];
    }

    function loadRecipes() {
      return fetch("recipes.json", { cache: "no-store" })
        .then(r => r.json())
        .then(data => {
          recipes = data.map(r => ({ ...r, _tags: deriveTags(r) }));
          buildFilters();
          setView(view);
          render();
          router();
        });
    }

    // Initial load. If we arrived here from an in-app update reload, the spinner
    // cover is already showing (see the inline script by #reloadCover) — keep it
    // up until recipes are actually rendered, then hide it.
    (function initialLoad() {
      const wasUpdating = !!sessionStorage.getItem("sfk-updating");
      loadRecipes()
        .catch(() => { results.innerHTML = '<div class="empty">Could not load recipes.json.</div>'; })
        .finally(() => {
          if (wasUpdating) sessionStorage.removeItem("sfk-updating");
          hideCover();
        });
    })();

    function buildFilters() {
      const cats = ["All", ...new Set(recipes.map(r => r.category).filter(Boolean))];
      catGroup.querySelectorAll(".chip").forEach(c => c.remove());
      cats.forEach(c => {
        const b = document.createElement("button");
        b.className = "chip" + (c === activeCat ? " active" : "");
        b.textContent = c;
        b.onclick = () => { activeCat = c; syncChips(); render(); };
        catGroup.appendChild(b);
      });

      const allTags = [...new Set(recipes.flatMap(r => r._tags))].sort();
      tagGroup.querySelectorAll(".chip").forEach(c => c.remove());
      allTags.forEach(t => {
        const b = document.createElement("button");
        b.className = "chip" + (activeTags.has(t) ? " active" : "");
        b.dataset.tag = t;
        b.textContent = cap(t);
        b.onclick = () => {
          if (activeTags.has(t)) activeTags.delete(t); else activeTags.add(t);
          syncChips(); render();
        };
        tagGroup.appendChild(b);
      });
    }

    function syncChips() {
      catGroup.querySelectorAll(".chip").forEach(b => b.classList.toggle("active", b.textContent === activeCat));
      tagGroup.querySelectorAll(".chip").forEach(b => b.classList.toggle("active", activeTags.has(b.dataset.tag)));
    }

    function setView(v) {
      view = v;
      localStorage.setItem("recipeView", v);
      results.className = v === "list" ? "list" : "grid";
      viewToggle.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.view === v));
    }
    viewToggle.querySelectorAll("button").forEach(b => { b.onclick = () => { setView(b.dataset.view); render(); }; });

    // ---- Fuzzy search ----
    function lev(a, b) {
      const m = a.length, n = b.length;
      if (!m) return n; if (!n) return m;
      let prev = Array.from({ length: n + 1 }, (_, i) => i);
      for (let i = 1; i <= m; i++) {
        const cur = [i];
        for (let j = 1; j <= n; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + cost);
        }
        prev = cur;
      }
      return prev[n];
    }
    function isSubseq(q, w) {
      let i = 0;
      for (const ch of w) { if (ch === q[i]) i++; if (i === q.length) return true; }
      return q.length === 0;
    }
    function wordScore(q, w) {
      if (q === w) return 1;
      if (w.startsWith(q)) return 0.95;
      if (w.includes(q)) return 0.85;
      const sim = 1 - lev(q, w) / Math.max(q.length, w.length);
      if (sim >= 0.7) return sim * 0.8;      // typo tolerance
      if (q.length >= 3 && isSubseq(q, w)) return 0.55;
      return 0;
    }
    function searchScore(r, q) {
      const qWords = q.toLowerCase().split(/\s+/).filter(Boolean);
      if (!qWords.length) return 1;
      const titleWords = (r.title || "").toLowerCase().split(/\s+/).filter(Boolean);
      const bodyWords = [r.description, r.category, ...r._tags, ...(r.ingredients || [])]
        .join(" ").toLowerCase().split(/\s+/).filter(Boolean);
      let total = 0;
      for (const qw of qWords) {
        let best = 0;
        for (const tw of titleWords) best = Math.max(best, wordScore(qw, tw));
        for (const bw of bodyWords) best = Math.max(best, wordScore(qw, bw) * 0.85);
        if (best < 0.5) return 0;            // every search word must match something
        total += best;
      }
      return total / qWords.length;
    }

    function render() {
      const list = recipes
        .filter(r => activeCat === "All" || r.category === activeCat)
        .filter(r => [...activeTags].every(t => r._tags.includes(t)))
        .sort((a, b) => a.title.localeCompare(b.title));

      empty.style.display = list.length ? "none" : "block";

      const activeCount = (activeCat !== "All" ? 1 : 0) + activeTags.size;
      filterBtn.classList.toggle("has", activeCount > 0);
      filterBadge.textContent = activeCount || "";
      countEl.textContent = `${list.length} recipe${list.length === 1 ? "" : "s"}`;
      applyBtn.textContent = `Show ${list.length} recipe${list.length === 1 ? "" : "s"}`;

      results.innerHTML = list.map(r => {
        const idx = recipes.indexOf(r);
        const tags = r._tags.map(t => `<span class="tag">${esc(cap(t))}</span>`).join("");
        return `<div class="card" data-i="${idx}">
          <div class="body">
            ${r.category ? `<span class="cat">${esc(r.category)}</span>` : ""}
            <h3>${esc(r.title)}</h3>
            <div class="meta">${[r.time, r.servings].filter(Boolean).map(esc).join(" · ")}</div>
            ${r.description ? `<div class="desc">${esc(r.description)}</div>` : ""}
          </div>
          ${tags ? `<div class="taglist">${tags}</div>` : ""}
        </div>`;
      }).join("");

      results.querySelectorAll(".card").forEach(card => {
        card.onclick = () => openRecipe(recipes[card.dataset.i]);
      });
    }

    // ---- Google-style search suggestions ----
    function renderSuggestions() {
      const q = query.trim();
      if (!q) { closeSuggest(); return; }
      const scored = recipes
        .map(r => ({ r, score: searchScore(r, q) }))
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 8);
      suggestIndex = -1;

      if (!scored.length) {
        suggest.innerHTML = `<div class="suggest-empty">No recipes match “${esc(q)}”.</div>`;
        openSuggest();
        return;
      }
      suggest.innerHTML = scored.map(({ r }) => {
        const idx = recipes.indexOf(r);
        const meta = [r.time, r._tags.map(cap).join(", ")].filter(Boolean).map(esc).join(" · ");
        return `<div class="suggest-item" role="option" data-i="${idx}">
          <span class="s-emoji">🍽️</span>
          <div class="s-main">
            <div class="s-title">${highlight(r.title, q)}</div>
            ${meta ? `<div class="s-meta">${meta}</div>` : ""}
          </div>
          ${r.category ? `<span class="s-cat">${esc(r.category)}</span>` : ""}
        </div>`;
      }).join("");

      suggest.querySelectorAll(".suggest-item").forEach(el => {
        // mousedown (not click) so it fires before the input's blur/outside-click closes the panel
        el.onmousedown = e => { e.preventDefault(); openRecipe(recipes[el.dataset.i]); };
      });
      openSuggest();
    }

    function highlight(text, q) {
      const escaped = esc(text);
      const present = q.toLowerCase().split(/\s+/).filter(Boolean)
        .filter(w => text.toLowerCase().includes(w));
      if (!present.length) return escaped;
      const re = new RegExp("(" + present.map(escapeReg).sort((a, b) => b.length - a.length).join("|") + ")", "gi");
      return escaped.replace(re, "<mark>$1</mark>");
    }

    function openSuggest() { suggest.classList.add("open"); searchEl.setAttribute("aria-expanded", "true"); }
    function closeSuggest() {
      suggest.classList.remove("open");
      searchEl.setAttribute("aria-expanded", "false");
      suggestIndex = -1;
    }
    function setActive(items) {
      items.forEach((el, i) => el.classList.toggle("active", i === suggestIndex));
      if (suggestIndex >= 0 && items[suggestIndex]) items[suggestIndex].scrollIntoView({ block: "nearest" });
    }

    // ---- Recipe page navigation (hash-routed for real back-button + shareable links) ----
    function openRecipe(r) {
      navigatedInApp = true;
      closeSuggest();
      location.hash = "#/recipe/" + encodeURIComponent(r.id);
    }

    function renderRecipe(r) {
      recipeContent.innerHTML = `
        ${r.category ? `<span class="cat">${esc(r.category)}</span>` : ""}
        <h2>${esc(r.title)}</h2>
        <div class="meta-row">
          ${r.time ? `<span>⏱ ${esc(r.time)}</span>` : ""}
          ${r.servings ? `<span>🍽 ${esc(r.servings)}</span>` : ""}
          ${r.author ? `<span>👤 ${esc(r.author)}</span>` : ""}
        </div>
        ${r.description ? `<div class="description">${esc(r.description)}</div>` : ""}
        ${r._tags.length ? `<div class="taglist">${r._tags.map(t => `<span class="tag">${esc(cap(t))}</span>`).join("")}</div>` : ""}
        <h4>Ingredients</h4>
        <ul>${(r.ingredients || []).map(x => `<li>${esc(x)}</li>`).join("")}</ul>
        <h4>Steps</h4>
        <ol>${(r.steps || []).map(x => `<li>${esc(x)}</li>`).join("")}</ol>
        ${r.notes ? `<div class="notes">💡 ${esc(r.notes)}</div>` : ""}
      `;
    }

    function showRecipe(r) {
      document.title = r.title + " · Snug Family Kitchen";
      renderRecipe(r);
      recipeScreen.classList.add("open");
      recipeScreen.setAttribute("aria-hidden", "false");
      recipeScreen.scrollTop = 0;
      document.body.style.overflow = "hidden";
      backBtn.focus();
    }

    function showHome() {
      document.title = "Snug Family Kitchen";
      recipeScreen.classList.remove("open");
      recipeScreen.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function goBack() {
      if (navigatedInApp && history.length > 1) history.back();
      else location.hash = "#/";
    }

    function router() {
      const m = location.hash.match(/^#\/recipe\/(.+)$/);
      if (m) {
        const r = recipes.find(x => x.id === decodeURIComponent(m[1]));
        if (r) { showRecipe(r); return; }
      }
      showHome();
    }
    window.addEventListener("hashchange", router);

    clearBtn.onclick = () => {
      activeCat = "All"; activeTags.clear();
      syncChips(); render();
    };
    backBtn.onclick = goBack;

    // Filter sheet open/close
    function openSheet() {
      sheet.classList.add("open"); sheetScrim.classList.add("open");
      document.body.style.overflow = "hidden";
    }
    function closeSheet() {
      sheet.classList.remove("open"); sheetScrim.classList.remove("open");
      if (!recipeScreen.classList.contains("open")) document.body.style.overflow = "";
    }
    filterBtn.onclick = openSheet;
    sheetClose.onclick = closeSheet;
    applyBtn.onclick = closeSheet;
    sheetScrim.onclick = closeSheet;

    document.addEventListener("keydown", e => {
      if (e.key !== "Escape") return;
      if (recipeScreen.classList.contains("open")) goBack();
      else if (sheet.classList.contains("open")) closeSheet();
    });

    // Search box -> suggestion dropdown
    searchEl.oninput = e => { query = e.target.value; renderSuggestions(); };
    searchEl.addEventListener("focus", () => { if (query.trim()) renderSuggestions(); });
    searchEl.addEventListener("keydown", e => {
      const items = [...suggest.querySelectorAll(".suggest-item")];
      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (!items.length) return;
        suggestIndex = Math.min(suggestIndex + 1, items.length - 1);
        setActive(items);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (!items.length) return;
        suggestIndex = Math.max(suggestIndex - 1, 0);
        setActive(items);
      } else if (e.key === "Enter") {
        if (items.length) {
          const el = items[suggestIndex >= 0 ? suggestIndex : 0];
          openRecipe(recipes[el.dataset.i]);
        }
      } else if (e.key === "Escape") {
        closeSuggest();
      }
    });
    document.addEventListener("click", e => { if (!e.target.closest(".search-wrap")) closeSuggest(); });

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function escapeReg(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
    function cap(s) { return String(s).charAt(0).toUpperCase() + String(s).slice(1); }

    // ---- Automatic update detection ----
    // Signs the deployed files (index.html + recipes.json) and re-checks on a
    // timer and whenever the app resumes. Any change is detected automatically —
    // nothing to bump by hand. A code change needs a full reload; a recipe-only
    // change is refreshed in place (no navigation).
    const updateScrim = document.getElementById("updateScrim");
    const reloadBtn = document.getElementById("reloadBtn");
    const reloadCover = document.getElementById("reloadCover");
    let baseIndexSig = null, baseRecipesSig = null;
    let latestIndexSig = null, latestRecipesSig = null;
    let pendingCodeChanged = false, pendingToken = "1", reloading = false;

    function showCover() { reloadCover.classList.add("show"); reloadCover.setAttribute("aria-hidden", "false"); }
    function hideCover() { reloadCover.classList.remove("show"); reloadCover.setAttribute("aria-hidden", "true"); }

    // Small string hash -> short URL-safe token (djb2).
    function hashStr(s) {
      let h = 5381;
      for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) >>> 0;
      return h.toString(36);
    }

    // Signature of one deployed file. Prefers a cheap HEAD (ETag/Last-Modified);
    // if the server exposes neither, falls back to hashing the body.
    async function sigFor(path) {
      const url = path + "?_=" + Date.now();
      try {
        const h = await fetch(url, { method: "HEAD", cache: "no-store" });
        if (h.ok) {
          const tag = h.headers.get("etag") || h.headers.get("last-modified");
          if (tag) return tag;
        }
      } catch (e) {}
      try {
        const g = await fetch(url, { cache: "no-store" });
        if (!g.ok) return null;
        return "b" + hashStr(await g.text());
      } catch (e) { return null; }
    }

    async function checkForUpdate() {
      if (reloading) return;
      const [idx, rec] = await Promise.all([sigFor("index.html"), sigFor("recipes.json")]);
      if (!idx || !rec) return;                                  // unreachable: try later
      if (baseIndexSig === null) { baseIndexSig = idx; baseRecipesSig = rec; return; }  // baseline
      const codeChanged = idx !== baseIndexSig;
      const recipesChanged = rec !== baseRecipesSig;
      if (codeChanged || recipesChanged) {
        pendingCodeChanged = codeChanged;
        latestIndexSig = idx; latestRecipesSig = rec;
        pendingToken = hashStr(idx + "|" + rec);
        updateScrim.classList.add("show");
      }
    }

    async function applyUpdate() {
      if (reloading) return;                       // ignore repeat taps
      reloading = true;
      updateScrim.classList.remove("show");
      showCover();                                 // spinner stays up until content is truly ready

      if (pendingCodeChanged) {
        // App code changed -> full reload. Flag it so the freshly loaded page keeps
        // the cover up until its recipes render (see initialLoad), avoiding the
        // "blank shell then recipes pop in" gap.
        try { sessionStorage.setItem("sfk-updating", "1"); } catch (e) {}
        const u = new URL(location.href);
        u.searchParams.set("v", pendingToken);     // stable, CDN-cacheable cache-bust
        const target = u.toString();
        requestAnimationFrame(() => requestAnimationFrame(() => location.replace(target)));
      } else {
        // Recipe-only change -> refresh data in place; no navigation, no flash.
        try {
          await loadRecipes();
          baseIndexSig = latestIndexSig; baseRecipesSig = latestRecipesSig;
        } catch (e) {}
        hideCover();
        reloading = false;
      }
    }

    reloadBtn.onclick = applyUpdate;

    // Strip the cache-busting ?v= param after a forced reload (keeps the URL clean; hash routing is untouched).
    (function cleanUrl() {
      const u = new URL(location.href);
      if (u.searchParams.has("v")) {
        u.searchParams.delete("v");
        history.replaceState(null, "", u.pathname + u.search + u.hash);
      }
    })();

    (async function initUpdateCheck() {
      await checkForUpdate();                       // establishes the baseline signature
      setInterval(checkForUpdate, 20000);
      // Fire an immediate check whenever the app resumes — the moment a
      // home-screen app is reopened is when a pending update should surface.
      document.addEventListener("visibilitychange", () => { if (!document.hidden) checkForUpdate(); });
      window.addEventListener("focus", checkForUpdate);
      window.addEventListener("pageshow", checkForUpdate);
    })();
  </script>
</body>
</html>
